<!DOCTYPE html>

<html>
  <head>
    <title>Yotsubishi Corporation</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
    </style>
    <link rel="stylesheet" href="./Resources/css/styles.css">
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li>
            <a href="#">
              <img src="./Resources/images/Logo.png">
            </a>
          </li>
          <li><a href="#">Products</a></li>
          <li><a href="#">Employees</a></li>
        </ul>
        <div class="company-name">Yotsubishi Corporation</div>
      </nav>
    </header>
    <main>
      <!-- Splash Section -->
      <section class="splash">
        <div class="splash-box">
          <div class="quote">
            <h1>Yotsubishi</h1>
            <h2>Why have three, when you could have four?</h2>
          </div>
        </div>
      </section>

      <!-- Products Section -->
      <section class="products">
        <div class="product">
          <div class="image-container">
            <img src="./Resources/images/Product 1.png">
          </div>
          <div class="content">
            <h3>Heating and Cooling Systems</h3>
          </div>
        </div>
        <div class="product">
          <div class="image-container">
            <img src="./Resources/images/Product 2.png">
          </div>
          <div class="content">
            <h3>Energy Systems</h3>
          </div>
        </div>
        <div class="product">
          <div class="image-container">
            <img src="./Resources/images/Product 3.png">
          </div>
          <div class="content">
            <h3>Factory Automation Systems</h3>
          </div>
        </div>
        <div class="product">
          <div class="image-container">
            <img src="./Resources/images/Product 4.png">
          </div>
          <div class="content">
            <h3>Computer Processors</h3>
          </div>
        </div>
      </section>

      <!-- Employees Section -->
      <section class="employees">
        <div class="employee">
          <div class="image-container">
            <img src="./Resources/images/Employee 1.png">
          </div>
          <div class="content">
            <h3>Bob Bobson</h3>
            <h4>Head of Marketing</h4>
          </div>
        </div>
        <div class="employee">
          <div class="image-container">
            <img src="./Resources/images/Employee 2.png">
          </div>
          <div class="content">
            <h3>Steve Stevenson</h3>
            <h4>CEO</h4>
          </div>
        </div>
        <div class="employee">
          <div class="image-container">
            <img src="./Resources/images/Employee 3.png">
          </div>
          <div class="content">
            <h3>Olivia Olivson</h3>
            <h4>Head of Product Development</h4>
          </div>
        </div>
      </section>

    </main>
  </body>
</html>
